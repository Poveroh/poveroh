worker_processes auto;
events { worker_connections 1024; }

http {
    server_names_hash_bucket_size 128;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Use Docker's embedded DNS resolver and lazy DNS resolution at request time.
    # This prevents nginx from failing at startup if some containers aren't yet registered
    # in Docker's DNS. Requests will resolve names when requested.
    resolver 127.0.0.11 valid=30s ipv6=off;
    resolver_timeout 5s;

    # ── Catch-all: reject unmatched HTTPS requests ────────────────────────────
    # Without this, nginx would fall back to the first ssl server block (studio)
    # for any hostname that has no explicit 443 block (e.g. redis, db).
    server {
        listen 443 ssl default_server;
        server_name _;

        ssl_certificate     /etc/nginx/ssl/poveroh.local.crt;
        ssl_certificate_key /etc/nginx/ssl/poveroh.local.key;

        return 444;
    }

    # ── app ───────────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name app.poveroh.local;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name app.poveroh.local;

        ssl_certificate     /etc/nginx/ssl/poveroh.local.crt;
        ssl_certificate_key /etc/nginx/ssl/poveroh.local.key;

        location / {
            set $backend "app:3000";
            proxy_pass http://$backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_connect_timeout 2s;
            proxy_read_timeout 10s;
            proxy_send_timeout 10s;
        }
    }

    # ── api ───────────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name api.poveroh.local;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name api.poveroh.local;

        ssl_certificate     /etc/nginx/ssl/poveroh.local.crt;
        ssl_certificate_key /etc/nginx/ssl/poveroh.local.key;

        location / {
            set $backend "api:3001";
            proxy_pass http://$backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_connect_timeout 2s;
            proxy_read_timeout 10s;
            proxy_send_timeout 10s;
        }
    }

    # ── studio ────────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name studio.poveroh.local;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name studio.poveroh.local;

        ssl_certificate     /etc/nginx/ssl/poveroh.local.crt;
        ssl_certificate_key /etc/nginx/ssl/poveroh.local.key;

        location / {
            set $backend "studio:5555";
            proxy_pass http://$backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_connect_timeout 2s;
            proxy_read_timeout 30s;
        }
    }

    # ── cdn ───────────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name cdn.poveroh.local;

        location / {
            root /usr/share/cdn-data;
            autoindex on;
        }
    }

    # ── db / redis ────────────────────────────────────────────────────────────
    # These are TCP services — HTTP proxying is not meaningful here.
    # Access them from other containers directly by service name (db:5432, redis:6379).
    # The server blocks below exist only to prevent nginx from returning 444
    # on port 80 and to show a clear error instead of silently forwarding.
    server {
        listen 80;
        server_name db.poveroh.local redis.poveroh.local;
        return 503 "This hostname is a TCP service and cannot be accessed via HTTP.";
    }
}

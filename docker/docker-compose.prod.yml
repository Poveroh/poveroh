volumes:
    database-data:
    redis-data:
    signoz-clickhouse:
    signoz-sqlite:
    signoz-zookeeper-1:

networks:
    poveroh_network:
        external: true

services:
    redis:
        image: ghcr.io/poveroh/poveroh-redis:latest
        container_name: redis
        restart: always
        env_file: .env
        ports:
            - 6379:6379
        volumes:
            - redis-data:/data
        networks:
            - poveroh_network

    db:
        image: ghcr.io/poveroh/poveroh-db:latest
        container_name: db
        restart: always
        env_file: .env
        ports:
            - 5432:5432
        volumes:
            - database-data:/var/lib/postgresql
        networks:
            - poveroh_network

    api:
        image: ghcr.io/poveroh/poveroh-api:latest
        container_name: api
        restart: always
        env_file: .env
        environment:
            - API_PORT=${API_PORT}
            - JWT_KEY=${JWT_KEY}
            - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${DATABASE_HOST}/${POSTGRES_DB}
            - CDN_LOCAL_DATA_PATH=${CDN_LOCAL_DATA_PATH}
        ports:
            - 3001:3001
        volumes:
            - ${CDN_LOCAL_DATA_PATH}:/usr/share/cdn-data
        networks:
            - poveroh_network

    app:
        image: ghcr.io/poveroh/poveroh-app:latest
        container_name: app
        restart: always
        env_file: .env
        environment:
            - NODE_ENV=production
            - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        ports:
            - 3000:3000
        networks:
            - poveroh_network
        depends_on:
            - api

    proxy:
        image: ghcr.io/poveroh/poveroh-proxy:latest
        container_name: proxy
        restart: always
        env_file: .env
        ports:
            - "80:80"
            - "443:443"
        networks:
            - poveroh_network

    # ───────────────────────── Signoz observability stack ─────────────────────────
    # Opt-in: activate with `COMPOSE_PROFILES=signoz` (driven by SIGNOZ_ENABLED in .env).
    signoz-init-clickhouse:
        profiles: ['signoz']
        container_name: signoz-init-clickhouse
        image: clickhouse/clickhouse-server:25.5.6
        restart: on-failure
        command:
            - bash
            - -c
            - |
                version="v0.0.1"
                node_os=$$(uname -s | tr '[:upper:]' '[:lower:]')
                node_arch=$$(uname -m | sed s/aarch64/arm64/ | sed s/x86_64/amd64/)
                cd /tmp
                wget -O histogram-quantile.tar.gz "https://github.com/SigNoz/signoz/releases/download/histogram-quantile%2F$${version}/histogram-quantile_$${node_os}_$${node_arch}.tar.gz"
                tar -xvzf histogram-quantile.tar.gz
                mv histogram-quantile /var/lib/clickhouse/user_scripts/histogramQuantile
        volumes:
            - ./signoz/clickhouse/user_scripts:/var/lib/clickhouse/user_scripts/
        networks:
            - poveroh_network

    signoz-zookeeper:
        profiles: ['signoz']
        container_name: signoz-zookeeper-1
        image: signoz/zookeeper:3.7.1
        user: root
        restart: unless-stopped
        environment:
            - ZOO_SERVER_ID=1
            - ALLOW_ANONYMOUS_LOGIN=yes
            - ZOO_AUTOPURGE_INTERVAL=1
            - ZOO_ENABLE_PROMETHEUS_METRICS=yes
            - ZOO_PROMETHEUS_METRICS_PORT_NUMBER=9141
        healthcheck:
            test: ['CMD-SHELL', 'curl -s -m 2 http://localhost:8080/commands/ruok | grep error | grep null']
            interval: 30s
            timeout: 5s
            retries: 3
        volumes:
            - signoz-zookeeper-1:/bitnami/zookeeper
        networks:
            # Alias matches the hostname in infra/signoz/clickhouse/cluster.xml (<host>zookeeper-1</host>).
            poveroh_network:
                aliases:
                    - zookeeper-1

    clickhouse:
        profiles: ['signoz']
        container_name: signoz-clickhouse
        image: clickhouse/clickhouse-server:25.5.6
        tty: true
        restart: unless-stopped
        environment:
            - CLICKHOUSE_SKIP_USER_SETUP=1
        ulimits:
            nproc: 65535
            nofile:
                soft: 262144
                hard: 262144
        depends_on:
            signoz-init-clickhouse:
                condition: service_completed_successfully
            signoz-zookeeper:
                condition: service_healthy
        healthcheck:
            test: ['CMD', 'wget', '--spider', '-q', '0.0.0.0:8123/ping']
            interval: 30s
            timeout: 5s
            retries: 3
        volumes:
            - ./signoz/clickhouse/config.xml:/etc/clickhouse-server/config.xml
            - ./signoz/clickhouse/users.xml:/etc/clickhouse-server/users.xml
            - ./signoz/clickhouse/custom-function.xml:/etc/clickhouse-server/custom-function.xml
            - ./signoz/clickhouse/user_scripts:/var/lib/clickhouse/user_scripts/
            - ./signoz/clickhouse/cluster.xml:/etc/clickhouse-server/config.d/cluster.xml
            - signoz-clickhouse:/var/lib/clickhouse/
        networks:
            - poveroh_network

    signoz:
        profiles: ['signoz']
        container_name: signoz
        image: signoz/signoz:${SIGNOZ_VERSION:-v0.125.1}
        restart: unless-stopped
        ports:
            - "8080:8080"
        environment:
            - SIGNOZ_ALERTMANAGER_PROVIDER=signoz
            - SIGNOZ_TELEMETRYSTORE_CLICKHOUSE_DSN=tcp://clickhouse:9000
            - SIGNOZ_SQLSTORE_SQLITE_PATH=/var/lib/signoz/signoz.db
            - SIGNOZ_TOKENIZER_JWT_SECRET=${SIGNOZ_JWT_SECRET:-secret}
        depends_on:
            clickhouse:
                condition: service_healthy
        healthcheck:
            test: ['CMD', 'wget', '--spider', '-q', 'localhost:8080/api/v1/health']
            interval: 30s
            timeout: 5s
            retries: 3
        volumes:
            - signoz-sqlite:/var/lib/signoz/
        networks:
            - poveroh_network

    signoz-otel-collector:
        profiles: ['signoz']
        container_name: signoz-otel-collector
        image: signoz/signoz-otel-collector:${SIGNOZ_OTELCOL_TAG:-v0.144.4}
        restart: unless-stopped
        entrypoint: ['/bin/sh']
        command:
            - -c
            - |
                /signoz-otel-collector migrate sync check &&
                /signoz-otel-collector --config=/etc/otel-collector-config.yaml --manager-config=/etc/manager-config.yaml --copy-path=/var/tmp/collector-config.yaml
        environment:
            - OTEL_RESOURCE_ATTRIBUTES=host.name=signoz-host,os.type=linux
            - LOW_CARDINAL_EXCEPTION_GROUPING=false
            - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_DSN=tcp://clickhouse:9000
            - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_CLUSTER=cluster
            - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_REPLICATION=true
            - SIGNOZ_OTEL_COLLECTOR_TIMEOUT=10m
        depends_on:
            clickhouse:
                condition: service_healthy
        ports:
            - "4317:4317"
            - "4318:4318"
        volumes:
            - ./signoz/otel-collector-config.yaml:/etc/otel-collector-config.yaml
            - ./signoz/otel-collector-opamp-config.yaml:/etc/manager-config.yaml
        networks:
            - poveroh_network

    signoz-migrator:
        profiles: ['signoz']
        container_name: signoz-telemetrystore-migrator
        image: signoz/signoz-otel-collector:${SIGNOZ_OTELCOL_TAG:-v0.144.4}
        restart: on-failure
        environment:
            - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_DSN=tcp://clickhouse:9000
            - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_CLUSTER=cluster
            - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_REPLICATION=true
            - SIGNOZ_OTEL_COLLECTOR_TIMEOUT=10m
        entrypoint: ['/bin/sh']
        command:
            - -c
            - |
                /signoz-otel-collector migrate bootstrap &&
                /signoz-otel-collector migrate sync up &&
                /signoz-otel-collector migrate async up
        depends_on:
            clickhouse:
                condition: service_healthy
        networks:
            - poveroh_network
